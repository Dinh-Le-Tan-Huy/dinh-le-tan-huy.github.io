name: Deploy Vite React App to GitHub Pages

on:
  push:
    branches:
      - main # Tự động chạy mỗi khi push code vào nhánh main

# Cấp quyền cho robot GitHub Actions được ghi dữ liệu lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cài đặt thư viện (Dependencies)
        run: npm ci # Lệnh cài đặt sạch chuẩn DevOps, nhanh và an toàn hơn npm install

      - name: Biên dịch dự án (Build)
        run: npm run build

      - name: Cấu hình GitHub Pages
        uses: actions/configure-pages@v4

      - name: Gom thư mục dist để chuẩn bị deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Đẩy lên GitHub Pages live công khai
        id: deployment
        uses: actions/deploy-pages@v4